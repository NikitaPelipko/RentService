<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты — MireaStay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl border-b border-slate-200">
        <nav class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                    <span class="text-white font-bold text-xl">M</span>
                </div>
                <span class="text-xl font-extrabold tracking-tight">MireaStay</span>
            </div>
            <ul class="hidden md:flex items-center gap-8 text-sm font-semibold text-slate-600">
                <li><a href="index.html" class="hover:text-indigo-600 transition">Главная</a></li>
                <li><a href="contacts.html" class="text-indigo-600 transition">Контакты</a></li>
                <li><a href="faq.html" class="hover:text-indigo-600 transition">FAQ</a></li>
                <li><a href="index.html#reviews" class="hover:text-indigo-600 transition">Отзывы</a></li>
            </ul>
            <button class="bg-slate-900 text-white px-6 py-2.5 rounded-full text-sm font-bold hover:bg-indigo-600 transition shadow-lg">Регистрация</button>
        </nav>
    </header>

    <main class="pt-40  pb-20 px-6 max-w-7xl mx-auto">
        <div class="grid lg:grid-cols-2 gap-16">
            <div>
                <h1 class="text-4xl font-extrabold mb-6">Свяжитесь с нами</h1>
                <p class="text-slate-500 mb-10">Мы всегда на связи, чтобы помочь вам с бронированием.</p>
                <div class="space-y-6">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-600 font-bold">📍</div>
                        <div><p class="text-xs font-bold uppercase text-slate-400">Адрес</p><p class="font-semibold">Москва, Стромынка, 20</p></div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-600 font-bold">📞</div>
                        <div><p class="text-xs font-bold uppercase text-slate-400">Телефон</p><p class="font-semibold">+7 (495) 123-45-67</p></div>
                    </div>
                </div>
            </div>

            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
                <form id="contact-form" data-validate="true" class="space-y-4">
                    <input id="contact-name" name="name" type="text" placeholder="Ваше имя" required data-min-length="2" class="w-full p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-indigo-500 outline-none">
                    <input id="contact-email" name="email" type="email" placeholder="Email" required class="w-full p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-indigo-500 outline-none">
                    <input id="contact-phone" name="phone" type="tel" placeholder="+7 (___) ___-__-__" required data-phone="true" class="w-full p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-indigo-500 outline-none">
                    <select id="contact-topic" name="topic" required class="w-full p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-indigo-500 outline-none text-slate-500">
                        <option>Вопрос по бронированию</option>
                        <option>Стать хостом</option>
                        <option>Другое</option>
                    </select>
                    <textarea id="contact-message" name="message" placeholder="Сообщение" rows="4" required data-min-length="10" class="w-full p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
                    <label class="flex items-center gap-3 py-2 cursor-pointer">
                        <input id="contact-consent" name="consent" type="checkbox" required class="w-5 h-5 rounded text-indigo-600">
                        <span class="text-sm text-slate-500">Согласие на обработку данных</span>
                    </label>
                    <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 transition shadow-lg shadow-indigo-100">Отправить</button>
                </form>
            </div>
        </div>
    </main>

    <script src="Scripts/logger.js"></script>
    <script src="Scripts/validation.js"></script>
</body>
</html>
